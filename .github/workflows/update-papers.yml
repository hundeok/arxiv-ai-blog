name: Daily ArXiv Paper Update

on:
  schedule:
    # Three sequential papers every four hours: up to 18/day without burst traffic.
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to run'
        required: false
        type: choice
        options:
          - publish
          - translate_titles
          - audit_cards
        default: publish
      batch_size:
        description: 'Papers to publish in this run (1-5)'
        required: false
        default: '3'

# A generation run can take more than 20 minutes. Queue runs instead of letting
# simultaneous checkouts race to commit to main.
concurrency:
  group: arxiv-paper-update
  cancel-in-progress: false

jobs:
  update-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Verify Gemini secret
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        if [ -z "$GEMINI_API_KEY" ]; then
          echo "GEMINI_API_KEY is not configured in GitHub Actions secrets."
          exit 1
        fi
        
    - name: Run Auto Blogger Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        BATCH_SIZE: ${{ inputs.batch_size || '4' }}
        DISCOVERY_LIMIT: '30'
        GEMINI_MODEL: gemini-3.1-flash-lite
        GEMINI_INPUT_USD_PER_MILLION: '0.25'
        GEMINI_OUTPUT_USD_PER_MILLION: '1.50'
        DAILY_BUDGET_USD: '0.15'
      run: |
        cd backend
        if [ "${{ inputs.operation || 'publish' }}" = "translate_titles" ]; then
          python process_content.py --translate-titles
        elif [ "${{ inputs.operation || 'publish' }}" = "audit_cards" ]; then
          python process_content.py --audit-cards
        else
          python process_content.py
        fi
        
    - name: Commit and Push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-update: New ArXiv papers decoded by AI"
        file_pattern: "frontend/public/content/* frontend/public/papers/* frontend/public/sitemap.xml frontend/public/sitemap-index.xml frontend/public/robots.txt"

    - name: Verify pipeline health
      run: |
        python -c "import json; report=json.load(open('frontend/public/content/pipeline-status.json', encoding='utf-8'))['last_run']; print(report); assert report['health'] == 'healthy', 'All selected papers failed; retry state was saved for the next run.'"
