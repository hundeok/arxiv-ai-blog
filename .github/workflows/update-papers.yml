name: Daily ArXiv Paper Update

on:
  schedule:
    # Every six hours. Small batches finish reliably and keep up with new papers.
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of latest papers to process (1-3)'
        required: false
        default: '3'

# A generation run can take more than 20 minutes. Queue runs instead of letting
# simultaneous checkouts race to commit to main.
concurrency:
  group: arxiv-paper-update
  cancel-in-progress: false

jobs:
  update-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Verify Gemini secret
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        if [ -z "$GEMINI_API_KEY" ]; then
          echo "GEMINI_API_KEY is not configured in GitHub Actions secrets."
          exit 1
        fi
        
    - name: Run Auto Blogger Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        MAX_RESULTS: ${{ inputs.batch_size || '3' }}
      run: |
        cd backend
        python process_content.py
        
    - name: Commit and Push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-update: New ArXiv papers decoded by AI"
        file_pattern: "frontend/public/content/* frontend/public/sitemap.xml"
