name: Daily ArXiv Paper Update

on:
  schedule:
    # 매일 한국 시간 아침 9시 (UTC 00:00) 에 실행
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  update-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Verify Gemini secret
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        if [ -z "$GEMINI_API_KEY" ]; then
          echo "GEMINI_API_KEY is not configured in GitHub Actions secrets."
          exit 1
        fi
        
    - name: Run Auto Blogger Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        cd backend
        python process_content.py
        
    - name: Commit and Push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-update: New ArXiv papers decoded by AI"
        file_pattern: "frontend/public/content/* frontend/public/sitemap.xml"
