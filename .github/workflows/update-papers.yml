name: Daily ArXiv Paper Update

on:
  schedule:
    # 매일 한국 시간 아침 9시 (UTC 00:00) 에 실행
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  update-papers:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pypdf google-generativeai urllib3
        
    - name: Run Auto Blogger Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        cd backend
        python process_content.py
        
    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add frontend/public/content/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: New ArXiv papers decoded by AI" && git push)
